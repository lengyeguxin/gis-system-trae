# Server configuration
server.port=8081

# PostgreSQL Database configuration
spring.datasource.url=jdbc:postgresql://192.168.0.212:5432/gis_system?useUnicode=true&characterEncoding=UTF-8
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# SQL initialization (only for test profile)
spring.sql.init.mode=never

# Video stream configuration
app.hls.dir=/opt/gis/hls

# Default profile (change to 'prod' for production)
# test: will initialize database with test data
# prod: will NOT initialize database
spring.profiles.active=test