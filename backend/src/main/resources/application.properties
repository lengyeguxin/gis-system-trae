# Server configuration
server.port=8081

# PostgreSQL Database configuration
spring.datasource.url=jdbc:postgresql://192.168.0.212:5432/gis_system?useUnicode=true&characterEncoding=UTF-8
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123456
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Default: test environment (load all SQL files)
# For production: spring.profiles.active=prod
spring.profiles.active=test

# Test profile: load test data
app.load-test-data=true
app.load-division-data=false